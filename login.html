<!DOCTYPE html>

<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2463eb",
            "background-light": "#f6f6f8",
            "background-dark": "#111621",
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login - TutorFlow</title>
  
    
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>

    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
        }
        /* Fix for buttons with light background */
        .bg-primary\/10 {
            background-color: rgba(36, 99, 235, 0.1) !important;
        }
        .text-primary {
            color: #2463eb !important;
        }
        .bg-primary {
            background-color: #2463eb !important;
        }
    </style>
    
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
      <!-- Navigation Bar -->
      <header
        class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white dark:bg-slate-900">
        <div class="flex items-center gap-2 text-primary">
          <div class="size-8">
            <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"
                fill="currentColor"></path>
            </svg>
          </div>
          <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">TutorFlow</h2>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="window.location.href='index.html'"
            class="hidden sm:flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary/10 text-primary text-sm font-semibold hover:bg-primary/20 transition-colors">
            <span>← Home</span>
          </button>
        </div>
      </header>
      <!-- Main Content Area -->
      <main class="flex flex-1 items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
          <!-- Login Card -->
          <div
            class="bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-800 p-8">
            <div class="mb-8 text-center">
              <h1 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight">Welcome back</h1>
              <p class="text-slate-500 dark:text-slate-400 mt-2">Manage your tutoring sessions with ease</p>
            </div>
            <div id="login-error"
              class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 font-medium">
            </div>
            <form id="login-form" class="space-y-6">
              <!-- Email Field -->
              <div class="space-y-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold" for="email">Email
                  address</label>
                <div class="relative">
                  <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                  <input
                    class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 pl-10 pr-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                    id="email" name="email" placeholder="name@company.com" required="" type="email" />
                </div>
              </div>
              <!-- Password Field -->
              <div class="space-y-2">
                <div class="flex justify-between items-center">
                  <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold"
                    for="password">Password</label>
                  <a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
                </div>
                <div class="relative">
                  <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                  <input
                    class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 pl-10 pr-12 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                    id="password" name="password" placeholder="••••••••" required="" type="password" />
                  <button
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                    type="button">
                    <span class="material-symbols-outlined text-xl">visibility</span>
                  </button>
                </div>
              </div>
              <!-- Submit Button -->
              <button id="login-btn"
                class="w-full bg-primary text-white py-3 px-4 rounded-lg font-bold text-base hover:bg-primary/90 transition-all transform active:scale-[0.98] shadow-lg shadow-primary/25"
                type="submit">
                Log In
              </button>
            </form>
            <!-- Divider -->
            <div class="relative my-8">
              <div class="absolute inset-0 flex items-center">
                <span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
              </div>
              <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-white dark:bg-slate-900 px-2 text-slate-500">Or continue with</span>
              </div>
            </div>
            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
              <button
                class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 py-2.5 px-4 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                <img alt="Google Logo" class="size-4" data-alt="Google company icon"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTFyLXL82BtLVAVRQ-HyHhcx2TD7x46ok_P8L-KG9iMN9yv5BV09avKvbhL7pOpyeZkNXUW4sx9hsmynJDtALPYoJ0ZcbmIMk-o75mm8MkQQvSM5b1t-nMQkau8D-KZf2PhPICDw4Wo6ETnXMAKE0ViBomo55LbQy0ER5UqE8GW8Vr-ngqLM6_C_oh4PDI8c7Lmzh0pm_PbupVqihPnberVRC35Uf4rkyMFiUWaMNiNY0fI6JxMHkQ8DiQyaQ1hegevjOQ2pYdGm0" />
                Google
              </button>
              <button
                class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 py-2.5 px-4 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-xl">ios</span>
                Apple
              </button>
            </div>
          </div>
          <!-- Footer Link -->
          <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
            Don't have an account?
            <a class="text-primary font-bold hover:underline" href="registeration.html">Sign up for free</a>
          </p>
        </div>
      </main>
      <!-- Footer -->
      <footer class="py-6 px-10 border-t border-slate-200 text-center">
        <p class="text-slate-400 text-xs">&copy; 2024 TutorFlow Inc. All rights reserved.</p>
      </footer>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      errEl.classList.add('hidden');
      const result = await loginUser(email, password);
      if (result.success) {
        showToast('Welcome back, ' + result.user.name.split(' ')[0] + '!');
        setTimeout(() => redirectToDashboard(result.user), 800);
      } else {
        errEl.textContent = result.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Log In'; btn.disabled = false;
      }
    });
    document.querySelector('[type="button"]').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = this.querySelector('.material-symbols-outlined');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.textContent = 'visibility_off'; }
      else { pwd.type = 'password'; icon.textContent = 'visibility'; }
    });
    const u = getCurrentUser();
    if (u) redirectToDashboard(u);
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8" }, fontFamily: { "display": ["Lexend"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Bookings - TutorFlow</title>
    
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="js/data.js"></script><script src="js/auth.js"></script>
    <script src="js/students.js"></script>
    
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>

    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
        }
        /* Fix for buttons with light background */
        .bg-primary\/10 {
            background-color: rgba(36, 99, 235, 0.1) !important;
        }
        .text-primary {
            color: #2463eb !important;
        }
        .bg-primary {
            background-color: #2463eb !important;
        }
    </style>
    
</head>

<body class="bg-background-light text-slate-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-primary p-1.5 rounded-lg text-white"><span
                        class="material-symbols-outlined text-2xl">auto_stories</span></div>
                <h2 class="text-xl font-bold tracking-tight">TutorFlow</h2>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a id="nav-dashboard"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"
                    href="#">
                    <span class="material-symbols-outlined">grid_view</span><span>Dashboard</span>
                </a>
                <a id="nav-my-bookings"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary font-medium cursor-pointer"
                    href="#">
                    <span class="material-symbols-outlined">calendar_today</span><span>My Bookings</span>
                </a>
                <a id="nav-find-tutors"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"
                    href="#">
                    <span class="material-symbols-outlined">person_search</span><span>Find Tutors</span>
                </a>
                <a id="nav-profile"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"
                    href="#">
                    <span class="material-symbols-outlined">manage_accounts</span><span>Profile</span>
                </a>
            </nav>
            <div class="p-4 mt-auto border-t border-slate-200">
                <div class="flex items-center gap-3 p-2">
                    <div class="size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-lg"
                        id="sidebar-avatar">S</div>
                    <div><span class="text-sm font-semibold block" data-user-name>Student</span><span
                            class="text-xs text-slate-500">Student Account</span></div>
                </div>
                <a id="nav-logout"
                    class="flex items-center gap-3 px-3 py-2 mt-2 rounded-lg text-red-400 hover:bg-red-50 transition-colors cursor-pointer"
                    href="#">
                    <span class="material-symbols-outlined">logout</span><span>Sign Out</span>
                </a>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <h2 class="text-xl font-bold">My Bookings</h2>
                <button data-action="book-session"
                    class="bg-primary text-white px-5 py-2 rounded-lg font-semibold text-sm hover:bg-primary/90 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">add</span>Book New Session
                </button>
            </header>
            <div class="flex-1 overflow-y-auto p-8">
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                        <h3 class="font-bold text-lg flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">event_note</span> All Bookings
                        </h3>
                        <span class="text-sm text-slate-400">Tip: pending = waiting for tutor</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Tutor</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Subject</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">Date
                                    </th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">Time
                                    </th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Duration</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Status</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-table-body">
                                <tr>
                                    <td colspan="7" class="py-10 text-center text-slate-400">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        initStudentBookingsPage();
        const u = getCurrentUser();
        if (u) document.getElementById('sidebar-avatar').textContent = u.name.charAt(0).toUpperCase();
    </script>
</body>

</html>

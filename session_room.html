<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8" }, fontFamily: { "display": ["Lexend"] } } } }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Session Room - TutorFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-size: 24px;
            vertical-align: middle;
        }

        .chat-container {
            height: calc(100vh - 350px);
            min-height: 400px;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 min-h-screen font-display">
    <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-2xl">meeting_room</span>
                <span class="text-lg font-bold">Session Room</span>
                <span id="session-status"
                    class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-green-100 text-green-700 ml-2">Active
                    Session</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="history.back()" class="text-sm font-semibold text-slate-600 hover:underline">Exit
                    Room</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
            <!-- Left Side: Session Info & Shared Notes -->
            <div class="lg:col-span-4 space-y-6">
                <!-- User Info -->
                <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                    <h3 class="font-bold text-lg mb-4">Participant</h3>
                    <div id="participant-info" class="flex items-center gap-4">
                        <div class="size-12 rounded-full bg-primary/10 flex items-center justify-center font-bold text-primary"
                            id="parti-avatar">?</div>
                        <div>
                            <p class="font-bold" id="parti-name">Loading...</p>
                            <p class="text-xs text-slate-500" id="parti-role">Session Member</p>
                        </div>
                    </div>
                    <div class="mt-6 p-4 bg-primary/5 rounded-xl border border-primary/10">
                        <p class="text-xs font-bold text-primary uppercase mb-1">Meeting Link</p>
                        <div class="flex items-center gap-2">
                            <input type="text" readonly value="https://meet.google.com/abc-defg-hij" id="meeting-url"
                                class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 truncate flex-1">
                            <button onclick="copyToClipboard('meeting-url')"
                                class="text-primary hover:text-primary/70"><span
                                    class="material-symbols-outlined text-lg">content_copy</span></button>
                        </div>
                    </div>
                    <button
                        class="w-full mt-4 bg-primary text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-primary/90 transition-all">
                        <span class="material-symbols-outlined">video_call</span> Start Video Call
                    </button>
                </div>

                <!-- Shared Notes -->
                <div class="bg-white rounded-2xl border border-slate-200 flex flex-col shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                        <h3 class="font-bold text-lg">Shared Notes</h3>
                        <button onclick="document.getElementById('note-modal').style.display='flex'"
                            class="size-8 rounded-lg bg-white border border-slate-200 flex items-center justify-center text-primary hover:shadow-md transition-all">
                            <span class="material-symbols-outlined text-lg">add</span>
                        </button>
                    </div>
                    <div id="notes-list" class="p-4 space-y-3 max-h-[300px] overflow-y-auto">
                        <p class="text-center text-slate-400 py-10 text-sm">No notes shared yet.</p>
                    </div>
                </div>
            </div>

            <!-- Right Side: Chat Area -->
            <div
                class="lg:col-span-8 flex flex-col h-full bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">chat</span>
                        <h3 class="font-bold">Session Chat</h3>
                    </div>
                    <span class="text-xs text-slate-400">Secure Channel</span>
                </div>

                <!-- Messages -->
                <div id="messages-container" class="chat-container p-6 overflow-y-auto space-y-4 bg-slate-50/30">
                    <!-- Messages will appear here -->
                </div>

                <!-- Message Input -->
                <div class="p-4 border-t border-slate-100">
                    <form id="chat-form" class="flex gap-4">
                        <input id="chat-input" type="text" required placeholder="Type a message..."
                            class="flex-1 rounded-xl border-slate-200 py-3 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
                        <button type="submit"
                            class="bg-primary text-white px-6 rounded-xl font-bold hover:bg-primary/90 flex items-center justify-center">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Note Modal -->
    <div id="note-modal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] items-center justify-center hidden">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-extrabold mb-4">Share a Note or Link</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Title</label>
                    <input id="note-title" type="text" placeholder="e.g. Maths formulas PDF"
                        class="w-full rounded-lg border-slate-200 outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Content / Link</label>
                    <textarea id="note-content" rows="4" placeholder="Enter session notes or a link..."
                        class="w-full rounded-lg border-slate-200 outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="document.getElementById('note-modal').style.display='none'"
                    class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-xl">Cancel</button>
                <button id="save-note-btn"
                    class="flex-1 py-3 bg-primary text-white font-bold rounded-xl hover:bg-primary/90">Share
                    Note</button>
            </div>
        </div>
    </div>

    <script src="js/session_room.js"></script>
</body>

</html>

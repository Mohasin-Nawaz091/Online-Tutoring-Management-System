<!DOCTYPE html>

<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <title>Register - EduTutor Management System</title>

    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
        }
        /* Fix for buttons with light background */
        .bg-primary\/10 {
            background-color: rgba(36, 99, 235, 0.1) !important;
        }
        .text-primary {
            color: #2463eb !important;
        }
        .bg-primary {
            background-color: #2463eb !important;
        }
    </style>
    
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-10 py-3">
                <div class="flex items-center gap-4">
                    <div class="text-primary">
                        <span class="material-symbols-outlined text-3xl">school</span>
                    </div>
                    <h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight">EduTutor
                    </h2>
                </div>
                <div class="flex items-center gap-4">
                    <span class="hidden sm:inline text-sm text-slate-500 dark:text-slate-400">Already have an
                        account?</span>
                    <button onclick="window.location.href='login.html'"
                        class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary/10 text-primary text-sm font-bold hover:bg-primary/20 transition-colors">
                        Sign In
                    </button>
                </div>
            </header>
            <main class="flex-1 flex items-center justify-center p-4 md:p-8">
                <div
                    class="w-full max-w-[960px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden">
                    <div class="hidden lg:block relative">
                        <div class="absolute inset-0 bg-primary/10"></div>
                        <div class="h-full w-full bg-cover bg-center"
                            data-alt="Students studying together in a modern library setting"
                            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCzNK-i8XkbLQJeR-dl3cedU1CKVDuAN_lqg7mTTZ_zwU9VgeCOLIZtyD65yZyN5AfGj5A8cQgj1Wlv2WRSOsqkCn3Obl4a9g7NNZipkX8BnTbmkdvsj1pDBdDvJl1fadKCAPcu3_52CI2K3dTl1TCkvwK8t-IxktpuI_FR54VTA0KUv2kuaX_DTTz8SVidVuRm-lT2DuZx9w6eKkEkYUpXg5r1584kkNGXWetzClcIIuRNPabYY8vEq_bjJoDMIF2SsYDimLEngFA')">
                        </div>
                        <div
                            class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black/60 to-transparent text-white">
                            <h3 class="text-2xl font-bold mb-2">Elevate Your Learning Journey</h3>
                            <p class="text-white/80">Connect with expert tutors or start your teaching career today on
                                the world's leading education platform.</p>
                        </div>
                    </div>
                    <div class="flex flex-col p-6 md:p-10 lg:p-12">
                        <div class="mb-8">
                            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-2">Create
                                Account</h1>
                            <p class="text-slate-500 dark:text-slate-400">Join our online tutoring community today</p>
                        </div>
                        <div id="reg-error"
                            class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 font-medium mb-2">
                        </div>
                        <form class="space-y-5" id="register-form">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">I am
                                    a:</label>
                                <div
                                    class="flex h-12 w-full items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
                                    <label
                                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
                                        <span class="truncate">Student</span>
                                        <input checked="" class="hidden" id="role-student" name="role" type="radio"
                                            value="student" />
                                    </label>
                                    <label
                                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
                                        <span class="truncate">Tutor</span>
                                        <input class="hidden" id="role-tutor" name="role" type="radio" value="tutor" />
                                    </label>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 gap-5">
                                <div class="space-y-1">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Full
                                        Name</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                        <input id="reg-name"
                                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="John Doe" type="text" required />
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Email
                                        Address</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                                        <input id="reg-email"
                                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="name@example.com" type="email" required />
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Phone
                                        Number</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">call</span>
                                        <input id="reg-phone"
                                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="+1 (555) 000-0000" type="tel" />
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Password</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                                        <input id="reg-password"
                                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                                            placeholder="••••••••" type="password" required />
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 pt-2">
                                <input class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4"
                                    id="terms" type="checkbox" />
                                <label class="text-xs text-slate-500 dark:text-slate-400" for="terms">
                                    I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a>
                                    and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
                                </label>
                            </div>
                            <button
                                class="w-full bg-primary text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2 mt-4"
                                type="submit">
                                Register Now
                                <span class="material-symbols-outlined text-lg">arrow_forward</span>
                            </button>
                        </form>
                        <div class="mt-8 flex items-center justify-center gap-4">
                            <div class="h-px flex-1 bg-slate-200 dark:bg-slate-800"></div>
                            <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">Or sign up
                                with</span>
                            <div class="h-px flex-1 bg-slate-200 dark:bg-slate-800"></div>
                        </div>
                        <div class="mt-6 grid grid-cols-2 gap-4">
                            <button
                                class="flex items-center justify-center gap-2 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                <img alt="Google Logo" class="w-4 h-4" data-alt="Google colorful icon logo"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVXt3RDAVYHEgMNNfVpEdBkqGZNf4eQ_JTwiLXiDWPdb82yp6r2WMMLe7hNJ96bP-P1sk3PVaGXfkekDCdGhvchD56m64ghEvaSDut9ejQ647JsofAxE-LWj4CqVkzEn4R5cXtwxs0_J1Hg2vbP_2rIRNh0j5HYSAFSl0IrMDkKdE9tAfmVkE_P4grxqeSGwpIH4OJP309kuptZ9JYHiWXv3TXZKXYd9AYykVGNpzElpBP3-hCEX51aPkmZI2l3BmAHet8t67i77Q" />
                                <span class="text-sm font-semibold">Google</span>
                            </button>
                            <button
                                class="flex items-center justify-center gap-2 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                <img alt="Apple Logo" class="w-4 h-4" data-alt="Apple dark grey icon logo"
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAE9CMc9muuRlqrC21YQC6IQuCsj-1b7J9oyznDOkCmX3Dfdto9OxfXYWuj1yaGEpg9Ya65xQzzOOqD83kpXbV0Z160YKuK20c8eqasASf7GkWc3xuwdU7JgnVcrgMmlBP54z92Miub_V8w4UtRpURjuJtRXT0mjXujw4vCCNNQmJl_rg8isna59yzggH0fnQGt-QYc4XICuBDrLoygeFoNNaxthKopNCZk9LG9n7ilMkuT_jQKKaaWJM3kzb9R8AVOB8mg_BpKipk" />
                                <span class="text-sm font-semibold">Apple</span>
                            </button>
                        </div>
                    </div>
                    <script>
                        document.getElementById('register-form').addEventListener('submit', async function (e) {
                            e.preventDefault();
                            const name = document.getElementById('reg-name').value.trim();
                            const email = document.getElementById('reg-email').value.trim();
                            const phone = document.getElementById('reg-phone').value.trim();
                            const password = document.getElementById('reg-password').value;
                            const role = document.querySelector('[name="role"]:checked').value;
                            const errEl = document.getElementById('reg-error');
                            const terms = document.getElementById('terms');
                            const btn = this.querySelector('button[type="submit"]');

                            if (terms && !terms.checked) { errEl.textContent = 'Please agree to the Terms of Service.'; errEl.classList.remove('hidden'); return; }
                            if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.remove('hidden'); return; }

                            btn.disabled = true;
                            btn.innerHTML = 'Registering... <span class="material-symbols-outlined text-lg animate-spin">sync</span>';

                            const result = await registerUser({ name, email, phone, password, role });
                            if (result.success) {
                                showToast('Account created! Redirecting...');
                                setTimeout(() => redirectToDashboard(result.user), 1200);
                            } else {
                                errEl.textContent = result.message;
                                errEl.classList.remove('hidden');
                                btn.disabled = false;
                                btn.innerHTML = 'Register Now <span class="material-symbols-outlined text-lg">arrow_forward</span>';
                            }
                        });
                        const u = getCurrentUser();
                        if (u) redirectToDashboard(u);
                    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8" }, fontFamily: { "display": ["Lexend"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Booking Requests - TutorFlow</title>
    
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="js/data.js"></script><script src="js/auth.js"></script>
    <script src="js/tutors.js"></script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>

    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
        }
        /* Fix for buttons with light background */
        .bg-primary\/10 {
            background-color: rgba(36, 99, 235, 0.1) !important;
        }
        .text-primary {
            color: #2463eb !important;
        }
        .bg-primary {
            background-color: #2463eb !important;
        }
    </style>
    
</head>

<body class="bg-background-light text-slate-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
            <div class="p-6 flex flex-col gap-4 h-full">
                <div class="flex items-center gap-3">
                    <div class="size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-xl"
                        id="sidebar-avatar">T</div>
                    <div>
                        <h1 class="text-sm font-semibold" data-user-name>Tutor</h1>
                        <p class="text-xs text-slate-500">Tutor Account</p>
                    </div>
                </div>
                <nav class="flex flex-col gap-1 grow">
                    <a id="nav-dashboard"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors cursor-pointer"
                        href="#">
                        <span class="material-symbols-outlined text-xl">dashboard</span><span
                            class="text-sm font-medium">Dashboard</span>
                    </a>
                    <a id="nav-session-requests"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary cursor-pointer"
                        href="#">
                        <span class="material-symbols-outlined text-xl">mark_email_unread</span><span
                            class="text-sm font-medium">Session Requests</span>
                    </a>
                    <a id="nav-profile"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors cursor-pointer"
                        href="#">
                        <span class="material-symbols-outlined text-xl">manage_accounts</span><span
                            class="text-sm font-medium">My Profile</span>
                    </a>
                    <a id="nav-logout"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-red-400 hover:bg-red-50 transition-colors cursor-pointer mt-2"
                        href="#">
                        <span class="material-symbols-outlined text-xl">logout</span><span
                            class="text-sm font-medium">Sign Out</span>
                    </a>
                </nav>
            </div>
        </aside>
        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">inbox</span> Booking Requests
                </h2>
                <div class="flex items-center gap-2 text-sm text-slate-500">
                    <span id="pending-count-badge"
                        class="bg-yellow-100 text-yellow-700 font-bold px-3 py-1 rounded-full text-xs"></span>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                        <h3 class="font-bold text-lg">All Requests</h3>
                        <p class="text-sm text-slate-400">Accept or reject incoming session requests</p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Student</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Subject</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">Date
                                    </th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">Time
                                    </th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Duration</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Status</th>
                                    <th class="px-5 py-3 text-xs font-bold uppercase text-slate-500 tracking-wider">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="requests-table-body">
                                <tr>
                                    <td colspan="7" class="py-10 text-center text-slate-400">Loading requests...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        initTutorRequestsPage();
        const u = getCurrentUser();
        if (u) {
            document.getElementById('sidebar-avatar').textContent = u.name.charAt(0).toUpperCase();
            const pending = fetchBookingsForTutor(u.id).filter(b => b.status === 'pending');
            const badge = document.getElementById('pending-count-badge');
            if (pending.length > 0) badge.textContent = pending.length + ' pending';
        }
    </script>
</body>

</html>

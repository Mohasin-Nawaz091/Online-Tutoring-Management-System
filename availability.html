<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#2463eb", "background-light": "#f6f6f8" }, fontFamily: { "display": ["Lexend"] } } } }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Manage Availability - TutorFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tutors.js"></script>
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-size: 24px;
            vertical-align: middle;
        }
    </style>
</head>

<body class="bg-background-light text-slate-900 min-h-screen font-display">
    <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-2xl">calendar_today</span>
                <span class="text-lg font-bold">Manage Availability</span>
            </div>
            <button onclick="history.back()"
                class="text-sm font-semibold text-primary hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Dashboard
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold">My Weekly Schedule</h1>
            <p class="text-slate-500 mt-1">Set the time slots when you are available to take sessions.</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div id="availability-container" class="divide-y divide-slate-100">
                <!-- Days will be loaded here -->
            </div>
        </div>

        <div class="mt-8 flex justify-end">
            <button id="save-all-btn"
                class="bg-primary text-white px-8 py-3 rounded-xl font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">save</span> Save All Changes
            </button>
        </div>
    </main>

    <script>
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const ALL_SLOTS = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'];
        let currentAvailability = {};

        async function init() {
            await initData();
            const user = getCurrentUser();
            if (!user || user.role !== 'tutor') { window.location.href = 'login.html'; return; }

            const data = await fetchAvailability(user.id);
            data.forEach(item => {
                currentAvailability[item.day] = item.slots;
            });

            renderDays();
        }

        function renderDays() {
            const container = document.getElementById('availability-container');
            container.innerHTML = DAYS.map(day => {
                const daySlots = currentAvailability[day] || [];
                return `
                    <div class="p-6">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="w-32">
                                <h3 class="font-bold text-lg">${day}</h3>
                                <p class="text-xs text-slate-400">${daySlots.length} slots set</p>
                            </div>
                            <div class="flex flex-wrap gap-2 flex-1">
                                ${ALL_SLOTS.map(slot => {
                    const isSelected = daySlots.includes(slot);
                    return `
                                        <button 
                                            onclick="toggleSlot('${day}', '${slot}')"
                                            class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${isSelected ? 'bg-primary text-white border-primary' : 'bg-white text-slate-600 border-slate-200 hover:border-primary/50'}"
                                        >
                                            ${slot}
                                        </button>
                                    `;
                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSlot(day, slot) {
            if (!currentAvailability[day]) currentAvailability[day] = [];
            const index = currentAvailability[day].indexOf(slot);
            if (index > -1) {
                currentAvailability[day].splice(index, 1);
            } else {
                currentAvailability[day].push(slot);
            }
            renderDays();
        }

        document.getElementById('save-all-btn').addEventListener('click', async () => {
            const user = getCurrentUser();
            const btn = document.getElementById('save-all-btn');
            btn.disabled = true;
            btn.innerHTML = 'Saving...';

            try {
                for (const day of DAYS) {
                    await updateAvailability({
                        tutor_id: user.id,
                        day: day,
                        slots: currentAvailability[day] || []
                    });
                }
                showToast('Schedule saved successfully!');
            } catch (e) {
                showToast('Failed to save schedule', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined">save</span> Save All Changes';
            }
        });

        init();
    </script>
</body>

</html>
